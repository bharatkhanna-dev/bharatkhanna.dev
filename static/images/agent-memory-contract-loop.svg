<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">The Memory Contract Loop</title>
  <desc id="desc">A diagram showing how the harness manages the working set, session journal, policy checks, durable memory, and retrieval planning.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F1E8"/>
      <stop offset="1" stop-color="#EEE6D8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#201A14" flood-opacity="0.10"/>
    </filter>
    <!-- solid arrow -->
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#2E3A46" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <!-- dashed arrow -->
    <marker id="arr-dash" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M1 1L9 5L1 9" stroke="#8A7A6B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="40" y="36" width="1320" height="828" rx="28" fill="#FBF8F2" stroke="#D8CDBB" stroke-width="2"/>

  <!-- title -->
  <text x="72" y="100" fill="#1F2A33" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="40" font-weight="700">The Memory Contract Loop</text>
  <text x="72" y="136" fill="#5D6A72" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="20">The harness decides what enters memory, what survives, and what returns to context.</text>

  <!--
    LAYOUT (clockwise flow):

    TOP ROW  (y=176, h=120):
      Events         x=72   w=200   cx=172   right=272
      Working Set    x=340  w=310   cx=495   right=650
      Extractor      x=740  w=220   cx=850   right=960
      Policy Gate    x=1080 w=220   cx=1190  right=1300

    GAP top→bottom:  top-row bottom = 296, Durable top = 460

    BOTTOM ROW:
      Session Jrnl   x=72   y=480  w=240  h=180   cx=192   bottom=660
      Retrieval Plan x=380  y=500  w=300  h=130   cx=530   right=680
      Durable Mem    x=820  y=460  w=500  h=230   cx=1070  right=1320  bottom=690

    ARROWS (exact edge-to-edge):
      1. Events right(272,236)   → Working Set left(340,236)       horizontal
      2. Working Set right(650,236) → Extractor left(740,236)      horizontal
      3. Extractor right(960,236)   → Policy Gate left(1080,236)   horizontal
      4. Policy Gate bottom(1190,296) → Durable top(1190,460)      vertical
      5. Durable left(820,575) → Retrieval right(680,565)          horizontal (slight offset ok, same row-ish)
      6. Retrieval top(530,500) → Working Set bottom(530,296)      vertical (Working Set cx≈495, use 530)
      7. Session bottom-right(312,660) curved → Retrieval left(380,565)  arc
      8. Working Set bottom(420,296) dashed curved → Session top(192,480)  arc (consolidation)
  -->

  <!-- === TOP ROW NODES === -->

  <!-- Events x=72 y=176 w=200 h=120 -->
  <rect x="72" y="176" width="200" height="120" rx="22" fill="#24313B" filter="url(#shadow)"/>
  <text x="172" y="228" fill="#F9F5ED" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Events</text>
  <text x="172" y="256" fill="#DCE5EA" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">User turns, tool outputs</text>
  <text x="172" y="278" fill="#DCE5EA" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">env signals</text>

  <!-- Working Set x=340 y=165 w=310 h=142 -->
  <rect x="340" y="165" width="310" height="142" rx="24" fill="#D9EEF7" stroke="#7CB5CC" stroke-width="2" filter="url(#shadow)"/>
  <text x="495" y="208" fill="#17384A" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" text-anchor="middle">Working Set</text>
  <text x="495" y="236" fill="#31576A" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Active goal · compact transcript</text>
  <text x="495" y="258" fill="#31576A" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">recent tool outputs · open decisions</text>
  <text x="495" y="280" fill="#31576A" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Prompt-sized, continuously pruned</text>

  <!-- Extractor x=740 y=174 w=220 h=124 -->
  <rect x="740" y="174" width="220" height="124" rx="22" fill="#F6DFC2" stroke="#D29A57" stroke-width="2" filter="url(#shadow)"/>
  <text x="850" y="220" fill="#52341A" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Extractor</text>
  <text x="850" y="250" fill="#7A5530" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Find candidate facts,</text>
  <text x="850" y="272" fill="#7A5530" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">episodes, and rules</text>

  <!-- Policy Gate x=1080 y=172 w=220 h=128 -->
  <rect x="1080" y="172" width="220" height="128" rx="22" fill="#F5D1C9" stroke="#CD7666" stroke-width="2" filter="url(#shadow)"/>
  <text x="1190" y="220" fill="#5F261E" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Policy Gate</text>
  <text x="1190" y="250" fill="#7E4238" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Privacy · scope</text>
  <text x="1190" y="272" fill="#7E4238" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">retention · trust</text>

  <!-- === BOTTOM ROW NODES === -->

  <!-- Durable Memory x=820 y=460 w=500 h=220 -->
  <!-- sub-boxes: Semantic x=854 w=134, Episodic x=1004 w=134, Procedural x=1154 w=134 -->
  <rect x="820" y="460" width="500" height="220" rx="26" fill="#DCEFD7" stroke="#7DA56E" stroke-width="2" filter="url(#shadow)"/>
  <text x="1070" y="502" fill="#234128" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" text-anchor="middle">Durable Memory</text>
  <!-- Semantic -->
  <rect x="854" y="520" width="130" height="130" rx="16" fill="#F7FBF5" stroke="#A8C59C" stroke-width="1.5"/>
  <text x="919" y="556" fill="#365238" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Semantic</text>
  <text x="919" y="580" fill="#557159" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">Facts and</text>
  <text x="919" y="600" fill="#557159" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">preferences</text>
  <!-- Episodic -->
  <rect x="1005" y="520" width="130" height="130" rx="16" fill="#F7FBF5" stroke="#A8C59C" stroke-width="1.5"/>
  <text x="1070" y="556" fill="#365238" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Episodic</text>
  <text x="1070" y="580" fill="#557159" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">Cases and</text>
  <text x="1070" y="600" fill="#557159" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">traces</text>
  <!-- Procedural -->
  <rect x="1156" y="520" width="130" height="130" rx="16" fill="#F7FBF5" stroke="#A8C59C" stroke-width="1.5"/>
  <text x="1221" y="556" fill="#365238" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">Procedural</text>
  <text x="1221" y="580" fill="#557159" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">Rules and</text>
  <text x="1221" y="600" fill="#557159" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">prompts</text>

  <!-- Retrieval Planner x=380 y=490 w=300 h=130 -->
  <rect x="380" y="490" width="300" height="130" rx="24" fill="#CFE8E1" stroke="#6EA89A" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="534" fill="#1E4842" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">Retrieval Planner</text>
  <text x="530" y="562" fill="#3D655E" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">Recall by task, recency,</text>
  <text x="530" y="584" fill="#3D655E" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">permissions, provenance, type</text>

  <!-- Session Journal x=72 y=490 w=260 h=175 -->
  <rect x="72" y="490" width="260" height="175" rx="24" fill="#EFE6F8" stroke="#A88AC8" stroke-width="2" filter="url(#shadow)"/>
  <text x="202" y="534" fill="#44305C" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">Session Journal</text>
  <text x="202" y="562" fill="#67517E" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">Full transcript · tool traces</text>
  <text x="202" y="584" fill="#67517E" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">approvals · retries</text>
  <text x="202" y="606" fill="#67517E" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">Feeds replay, audit,</text>
  <text x="202" y="628" fill="#67517E" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">evals, consolidation</text>

  <!-- === ARROWS === -->

  <!-- 1. Events(right=272, cy=236) → Working Set(left=340, cy=236) horizontal -->
  <path d="M272 236 H334" stroke="#2E3A46" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 2. Working Set(right=650, cy=236) → Extractor(left=740, cy=236) horizontal -->
  <path d="M650 236 H734" stroke="#2E3A46" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 3. Extractor(right=960, cy=236) → Policy Gate(left=1080, cy=236) horizontal -->
  <path d="M960 236 H1074" stroke="#2E3A46" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 4. Policy Gate(bottom cx=1190, y=300) → Durable Memory(top cx=1190, y=460) vertical -->
  <path d="M1190 300 V454" stroke="#2E3A46" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 5. Durable Memory(left=820, cy=570) → Retrieval Planner(right=680, cy=555) horizontal -->
  <path d="M820 568 H686" stroke="#2E3A46" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 6. Retrieval Planner(top cx=530, y=490) → Working Set(bottom cx=530, y=307) vertical -->
  <path d="M530 490 V313" stroke="#2E3A46" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 7. Session Journal(right=332, cy=577) → Retrieval Planner(left=380, cy=555) short horizontal arc -->
  <path d="M332 577 H374" stroke="#2E3A46" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- 8. Working Set(bottom, x≈420, y=307) → Session Journal(top, cx=202, y=490)
       Dashed curved path: consolidation loop down-left -->
  <path d="M420 307 C420 400 202 380 202 484" stroke="#8A7A6B" stroke-width="2" stroke-dasharray="8 6" marker-end="url(#arr-dash)" fill="none"/>

  <!-- consolidation label -->
  <text x="285" y="415" fill="#8A7A6B" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="13" text-anchor="middle" transform="rotate(-55 285 415)">background consolidation</text>

  <!-- footer note -->
  <text x="72" y="822" fill="#6A6259" font-family="Aptos, Segoe UI, Arial, sans-serif" font-size="18">Key idea: memory quality is determined by movement rules, not just storage primitives.</text>
</svg>