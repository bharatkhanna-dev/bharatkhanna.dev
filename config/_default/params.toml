description = "AI engineer building production-grade LLM systems, agent architectures, evaluation workflows, vector retrieval pipelines, and dependable developer infrastructure."
externalLinkDecoration = true
displayUpdatedDate = true
dateFormat = "January 2, 2006"

[navbar]
  displayTitle = true
  displayLogo = false
  width = "wide"

[theme]
  default = "system"
  displayToggle = true

[footer]
  enable = true
  displayCopyright = true
  displayPoweredBy = false
  width = "normal"

[search]
  enable = true
  type = "flexsearch"

[page]
  width = "normal"

[blog]
  [blog.article]
    displayPagination = true

  [blog.list]
    sortBy = "date"
    sortOrder = "desc"
    displayTags = true
    pagerSize = 10
